version: 2

models:
  - name: dim_regions
    description: "Dimension table for sales regions."
    columns:
      - name: region_id
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Dimension table for products."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_sales_reps
    description: "Dimension table for sales representatives."
    columns:
      - name: sales_rep_id
        tests:
          - unique
          - not_null

  - name: dim_customers
    description: "Dimension table for customers enriched with customer revenue metrics."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Date dimension table covering the analytics period."
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

      - name: date_day
        tests:
          - unique
          - not_null

  - name: fct_order_items
    description: "Fact table at the order item grain."
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: quantity
        tests:
          - not_null
          - positive_value

      - name: unit_price
        tests:
          - not_null
          - positive_value

      - name: discount
        tests:
          - not_null
          - between_zero_and_one

      - name: gross_revenue
        tests:
          - not_null
          - non_negative

      - name: net_revenue
        tests:
          - not_null
          - non_negative

      - name: recognized_revenue
        tests:
          - not_null
          - non_negative

      - name: sales_rep_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_sales_reps')
                field: sales_rep_id

  - name: fct_opportunities
    description: "Fact table at the opportunity grain."
    columns:
      - name: opportunity_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: sales_rep_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_sales_reps')
                field: sales_rep_id
      - name: expected_revenue
        tests:
          - not_null
          - positive_value

      - name: probability
        tests:
          - not_null
          - between_zero_and_one

      - name: weighted_pipeline_value
        tests:
          - not_null
          - non_negative
